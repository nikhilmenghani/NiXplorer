name: Android CI and release

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        type: choice
        options:
          - dev
          - stable

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  verify-debug:
    name: Verify debug build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate version files
        shell: bash
        run: bash .github/scripts/validate-versions.sh
      - name: Build and verify debug
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: NiXplorer-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  publish:
    name: Publish ${{ inputs.channel }} release
    if: github.event_name == 'workflow_dispatch'
    needs: verify-debug
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate versions and select release
        id: release
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .github/scripts/validate-versions.sh
          FILE=release.txt
          TASK=assembleRelease
          APK=app/build/outputs/apk/release/app-release.apk
          PRERELEASE=false
          if [[ "$CHANNEL" == dev ]]; then
            FILE=dev.txt
            TASK=assembleDebug
            APK=app/build/outputs/apk/debug/app-debug.apk
            PRERELEASE=true
          fi
          VERSION=$(sed -n 's/^versionName=//p' "$FILE")
          CODE=$(sed -n 's/^versionCode=//p' "$FILE")
          OTHER_FILE=dev.txt
          [[ "$CHANNEL" == dev ]] && OTHER_FILE=release.txt
          OTHER_CODE=$(sed -n 's/^versionCode=//p' "$OTHER_FILE")
          if (( CODE <= OTHER_CODE )); then
            echo "Selected versionCode $CODE must exceed the other channel's $OTHER_CODE" >&2
            exit 1
          fi
          TAG="v$VERSION"
          if git show-ref --verify --quiet "refs/tags/$TAG" || gh release view "$TAG" >/dev/null 2>&1; then
            echo "Tag or release $TAG already exists" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
      - name: Restore release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64" || { echo 'Missing RELEASE_KEYSTORE_BASE64' >&2; exit 1; }
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/nixplorer-release.jks"
      - name: Build signed APK
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$STORE_PASSWORD" && test -n "$KEY_ALIAS" && test -n "$KEY_PASSWORD"
          EXTRA=()
          [[ '${{ inputs.channel }}' == dev ]] && EXTRA+=("-PusePublishingSigning=true")
          ./gradlew --no-daemon '${{ steps.release.outputs.task }}' \
            -PreleaseStoreFile="$RUNNER_TEMP/nixplorer-release.jks" \
            -PreleaseStorePassword="$STORE_PASSWORD" \
            -PreleaseKeyAlias="$KEY_ALIAS" \
            -PreleaseKeyPassword="$KEY_PASSWORD" "${EXTRA[@]}"
      - name: Verify signature and checksum
        id: artifact
        shell: bash
        run: |
          SOURCE='${{ steps.release.outputs.apk }}'
          OUTPUT="NiXplorer-${{ steps.release.outputs.version }}.apk"
          cp "$SOURCE" "$OUTPUT"
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner" verify --verbose "$OUTPUT"
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"
          echo "apk=$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "checksum=$OUTPUT.sha256" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          FLAGS=(--generate-notes --title "NiXplorer ${{ steps.release.outputs.version }}")
          [[ '${{ steps.release.outputs.prerelease }}' == true ]] && FLAGS+=(--prerelease)
          gh release create '${{ steps.release.outputs.tag }}' \
            '${{ steps.artifact.outputs.apk }}' '${{ steps.artifact.outputs.checksum }}' "${FLAGS[@]}"
